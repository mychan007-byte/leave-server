<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบการลาราชการ - สภ.ดอนหัวฬ่อ</title>
<style>
  :root{--navy:#1a3a6b;--navy2:#25498a;--gold:#c9a227;--bg:#eef2f7;--card:#fff;
    --line:#d9e0ea;--txt:#1f2a3a;--muted:#697586;--green:#1f8a4c;--red:#c0392b;--amber:#c98a12;--blue:#2a6cc9;}
  *{box-sizing:border-box;font-family:"Sarabun","Segoe UI",Tahoma,sans-serif}
  body{margin:0;background:var(--bg);color:var(--txt);font-size:15px}
  header{background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff;padding:14px 22px;
    display:flex;align-items:center;gap:14px;box-shadow:0 2px 8px rgba(0,0,0,.15)}
  header .logo{width:46px;height:46px;border-radius:50%;background:var(--gold);display:flex;
    align-items:center;justify-content:center;font-size:26px;flex:0 0 auto}
  header h1{font-size:19px;margin:0;line-height:1.2}
  header .sub{font-size:12.5px;opacity:.85}
  header .spacer{flex:1}
  header .whoami{text-align:right;font-size:13px}
  header button{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.35);
    padding:6px 12px;border-radius:6px;cursor:pointer;font-size:13px}
  header button:hover{background:rgba(255,255,255,.28)}
  .wrap{max-width:1080px;margin:22px auto;padding:0 16px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:22px;
    margin-bottom:18px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
  h2{font-size:18px;margin:0 0 14px;color:var(--navy);border-bottom:2px solid var(--gold);
    padding-bottom:8px;display:inline-block}
  h3{color:var(--navy2);margin:16px 0 6px}
  label{display:block;font-size:13.5px;font-weight:600;margin:12px 0 5px}
  input,select,textarea{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:8px;
    font-size:14.5px;background:#fbfcfe}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--navy2);box-shadow:0 0 0 3px rgba(37,73,138,.12)}
  textarea{resize:vertical;min-height:70px}
  .row{display:flex;gap:14px;flex-wrap:wrap}.row>div{flex:1;min-width:170px}
  .btn{background:var(--navy);color:#fff;border:none;padding:10px 18px;border-radius:8px;cursor:pointer;font-size:14.5px;font-weight:600}
  .btn:hover{background:var(--navy2)}.btn.green{background:var(--green)}.btn.red{background:var(--red)}
  .btn.gold{background:var(--gold);color:#3a2e00}.btn.ghost{background:#fff;color:var(--navy);border:1px solid var(--navy)}
  .btn.sm{padding:6px 12px;font-size:13px}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th,td{padding:9px 10px;text-align:left;border-bottom:1px solid var(--line);vertical-align:top}
  th{background:#f3f6fb;color:var(--navy);font-weight:700}tr:hover td{background:#f8fafd}
  .pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700}
  .p-wait{background:#fdf3d9;color:var(--amber)}.p-ok{background:#e0f3e8;color:var(--green)}
  .p-no{background:#fbe3e0;color:var(--red)}.p-type{background:#e7eefb;color:var(--blue)}
  .tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
  .tabs button{background:#fff;border:1px solid var(--line);padding:9px 16px;border-radius:8px;cursor:pointer;
    font-size:14px;font-weight:600;color:var(--muted)}
  .tabs button.active{background:var(--navy);color:#fff;border-color:var(--navy)}
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px}
  .stat{background:#fff;border:1px solid var(--line);border-radius:10px;padding:16px;text-align:center}
  .stat .n{font-size:28px;font-weight:800;color:var(--navy)}.stat .l{font-size:13px;color:var(--muted);margin-top:3px}
  .login-box{max-width:460px;margin:44px auto}.muted{color:var(--muted);font-size:13px}
  .steps{display:flex;flex-direction:column;gap:8px;margin-top:8px}
  .step{display:flex;align-items:center;gap:10px;font-size:13px}
  .dot{width:22px;height:22px;border-radius:50%;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;font-weight:700}
  .dot.ok{background:var(--green)}.dot.no{background:var(--red)}.dot.wait{background:#c9ccd2}.dot.now{background:var(--amber)}
  .modal-bg{position:fixed;inset:0;background:rgba(20,30,50,.55);display:none;align-items:center;justify-content:center;z-index:50;padding:16px}
  .modal-bg.show{display:flex}
  .modal{background:#fff;border-radius:14px;max-width:600px;width:100%;padding:24px;max-height:90vh;overflow:auto}
  .empty{text-align:center;color:var(--muted);padding:34px 0}
  .badge{background:var(--red);color:#fff;border-radius:20px;padding:1px 7px;font-size:11px;margin-left:5px}
  .divider{display:flex;align-items:center;gap:10px;color:var(--muted);margin:16px 0}
  .divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--line)}
  footer{text-align:center;color:var(--muted);font-size:12px;padding:20px}
  @media(max-width:600px){.whoami .nm{display:none}}
</style>
</head>
<body>
<div id="app"></div>
<div class="modal-bg" id="modalBg"><div class="modal" id="modalBody"></div></div>
<footer>ระบบการลาราชการ (เซิร์ฟเวอร์กลาง) — สถานีตำรวจภูธรดอนหัวฬ่อ</footer>

<script>
/* ===== state ===== */
let TOKEN=sessionStorage.getItem("dhl_token")||null;
let ME=null;        // {user} หรือ {admin:true}
let BOOT=null;      // bootstrap data
let TAB=null;

const $=s=>document.querySelector(s);
function esc(s){return (s==null?"":String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function fmtDate(iso){if(!iso)return"-";const d=new Date((iso.length>10?iso:iso+"T00:00:00"));
  return d.toLocaleDateString("th-TH",{day:"numeric",month:"short",year:"numeric"})}
function fmtDT(iso){const d=new Date(iso);return d.toLocaleDateString("th-TH",{day:"numeric",month:"short",year:"numeric"})+" "+d.toLocaleTimeString("th-TH",{hour:"2-digit",minute:"2-digit"})}
function shortGroup(g){return (g||"").replace(/\s*\(\s*\d+\s*นาย\s*\)/,"").trim()}

async function api(path,opt={}){
  opt.headers=Object.assign({"Content-Type":"application/json"},opt.headers||{});
  if(TOKEN)opt.headers["Authorization"]="Bearer "+TOKEN;
  const r=await fetch("/api"+path,opt);
  if(r.status===401){logout();throw new Error("หมดเวลาการเข้าสู่ระบบ");}
  const j=await r.json().catch(()=>({}));
  if(!r.ok)throw new Error(j.error||"เกิดข้อผิดพลาด");
  return j;
}
async function apiForm(path,formData){
  const h={};if(TOKEN)h["Authorization"]="Bearer "+TOKEN;
  const r=await fetch("/api"+path,{method:"POST",headers:h,body:formData});
  const j=await r.json().catch(()=>({}));
  if(!r.ok)throw new Error(j.error||"อัปโหลดไม่สำเร็จ");
  return j;
}

/* ===== boot ===== */
async function init(){
  BOOT=await api("/bootstrap");
  if(TOKEN){ try{ME=await api("/me");}catch(e){TOKEN=null;} }
  render();
}
window.addEventListener("DOMContentLoaded",()=>{init().catch(e=>alert(e.message));});

/* ===== login ===== */
function renderLogin(){
  const groups=BOOT.groups;
  const opts=groups.map(g=>`<optgroup label="${esc(shortGroup(g))}">`+
    BOOT.users.filter(u=>u.group===g).map(u=>`<option value="${u.id}">${esc(u.name)} — ${esc(u.pos||u.role)}</option>`).join("")+
    `</optgroup>`).join("");
  $("#app").innerHTML=`
  <header><div class="logo">🛡️</div><div><h1>ระบบการลาราชการ</h1><div class="sub">${esc(BOOT.station)}</div></div></header>
  <div class="wrap"><div class="card login-box">
    <h2>เข้าสู่ระบบ</h2>
    <label>เลือกผู้ใช้งาน</label>
    <select id="loginUser">${opts}</select>
    <button class="btn" style="width:100%;margin-top:10px" onclick="doLogin()">เข้าสู่ระบบ</button>
    <div class="divider">หรือ</div>
    <label>เข้าสู่ระบบผู้ดูแลระบบ</label>
    <input type="password" id="adminPass" placeholder="รหัสผ่านผู้ดูแลระบบ" onkeydown="if(event.key==='Enter')doAdminLogin()">
    <button class="btn ghost" style="width:100%;margin-top:8px" onclick="doAdminLogin()">เข้าสู่ระบบผู้ดูแล</button>
  </div></div>`;
}
async function doLogin(){
  try{const r=await api("/login",{method:"POST",body:JSON.stringify({userId:$("#loginUser").value})});
    TOKEN=r.token;sessionStorage.setItem("dhl_token",TOKEN);ME={user:r.user};TAB=null;render();
  }catch(e){alert(e.message);}
}
async function doAdminLogin(){
  try{const r=await api("/admin/login",{method:"POST",body:JSON.stringify({password:$("#adminPass").value})});
    TOKEN=r.token;sessionStorage.setItem("dhl_token",TOKEN);ME={admin:true};TAB=null;render();
  }catch(e){alert(e.message);}
}
function logout(){TOKEN=null;ME=null;sessionStorage.removeItem("dhl_token");render();}

/* ===== main render ===== */
function isApprover(){return ME.user&&["supervisor","deputy","commander"].includes(ME.user.role);}
async function render(){
  if(!ME){renderLogin();return;}
  let tabs=[];
  if(ME.admin){tabs=[["all","ใบลาทั้งหมด"],["users","จัดการรายชื่อ"],["routing","สายการอนุมัติ"],["import","นำเข้า Excel"],["report","รายงาน"]];}
  else{
    let pend=0;
    if(isApprover()){try{pend=(await api("/leaves?scope=approve")).length;}catch(e){}}
    if(isApprover())tabs.push(["approve","รออนุมัติ"+(pend?`<span class="badge">${pend}</span>`:"")]);
    tabs.push(["new","ยื่นใบลา"],["mine","ใบลาของฉัน"],["sum","สรุปวันลา"]);
    if(isApprover())tabs.push(["all","ใบลาในกำกับ"]);
  }
  const active=TAB&&tabs.some(t=>t[0]===TAB)?TAB:tabs[0][0];TAB=active;
  const who=ME.admin?"ผู้ดูแลระบบ":ME.user.name;
  const sub=ME.admin?"ผู้ดูแลระบบ":(ME.user.pos||ME.user.role);
  $("#app").innerHTML=`
  <header><div class="logo">🛡️</div><div><h1>ระบบการลาราชการ</h1><div class="sub">${esc(BOOT.station)}</div></div>
    <div class="spacer"></div>
    <div class="whoami"><div class="nm"><b>${esc(who)}</b></div><div style="opacity:.85">${esc(sub)}</div></div>
    <button onclick="logout()">ออกจากระบบ</button></header>
  <div class="wrap"><div class="tabs">${tabs.map(t=>`<button class="${t[0]===active?'active':''}" onclick="go('${t[0]}')">${t[1]}</button>`).join("")}</div>
  <div id="view"><div class="card"><div class="empty">กำลังโหลด...</div></div></div></div>`;
  loadTab(active);
}
function go(t){TAB=t;render();}

async function loadTab(t){
  try{
    if(t==="new")$("#view").innerHTML=viewNew();
    else if(t==="mine")renderList(await api("/leaves?scope=mine"),"ใบลาของฉัน",true);
    else if(t==="approve")renderApprove(await api("/leaves?scope=approve"));
    else if(t==="all")renderList(await api(ME.admin?"/leaves":"/leaves?scope=all"),ME.admin?"ใบลาทั้งหมด":"ใบลาในกำกับของท่าน",false);
    else if(t==="sum")renderSummary(await api("/summary"));
    else if(t==="users")renderUsers(await api("/admin/users"));
    else if(t==="routing")renderRouting(await api("/admin/routing"));
    else if(t==="import")renderImport();
    else if(t==="report")renderReport(await api("/report"));
  }catch(e){$("#view").innerHTML=`<div class="card"><div class="empty">${esc(e.message)}</div></div>`;}
}

/* ===== ยื่นใบลา ===== */
function viewNew(){
  const today=new Date().toISOString().slice(0,10);
  return `<div class="card"><h2>แบบฟอร์มยื่นใบลา</h2>
    <p class="muted">ผู้ยื่น: <b>${esc(ME.user.name)}</b> · ${esc(ME.user.pos)} · ${esc(shortGroup(ME.user.group))}</p>
    <label>ประเภทการลา</label>
    <select id="fType">${Object.entries(BOOT.leaveTypes).map(([k,v])=>`<option value="${k}">${v.label}</option>`).join("")}</select>
    <div class="row">
      <div><label>ตั้งแต่วันที่</label><input type="date" id="fFrom" value="${today}" onchange="calcDays()"></div>
      <div><label>ถึงวันที่</label><input type="date" id="fTo" value="${today}" onchange="calcDays()"></div>
      <div><label>รวมจำนวน</label><input id="fDays" value="1 วัน" readonly></div>
    </div>
    <label>เหตุผล / รายละเอียด</label><textarea id="fReason" placeholder="ระบุเหตุผลการลา"></textarea>
    <label>ผู้ปฏิบัติหน้าที่แทน (ถ้ามี)</label><input id="fCover">
    <div style="margin-top:16px"><button class="btn" onclick="submitLeave()">ส่งใบลา</button></div>
  </div>`;
}
function calcDays(){const f=$("#fFrom").value,t=$("#fTo").value;if(!f||!t)return;
  const d=Math.round((new Date(t)-new Date(f))/86400000)+1;$("#fDays").value=(d>0?d:"-")+" วัน";}
async function submitLeave(){
  try{const r=await api("/leaves",{method:"POST",body:JSON.stringify({
    type:$("#fType").value,from:$("#fFrom").value,to:$("#fTo").value,
    reason:$("#fReason").value,cover:$("#fCover").value})});
    alert("ส่งใบลาเรียบร้อย เลขที่ "+r.no+(r.autoApproved?" (อนุมัติในตัว)":""));go("mine");
  }catch(e){alert(e.message);}
}

/* ===== ตาราง ===== */
function renderList(list,title,mine){
  $("#view").innerHTML=!list.length?`<div class="card"><h2>${title}</h2><div class="empty">ยังไม่มีใบลา</div></div>`:
   `<div class="card"><h2>${title}</h2><table><thead><tr><th>เลขที่</th>${mine?"":"<th>ผู้ลา</th>"}<th>ประเภท</th><th>ช่วงวันลา</th><th>วัน</th><th>สถานะ</th><th></th></tr></thead>
   <tbody>${list.map(l=>`<tr><td>${esc(l.no)}</td>${mine?"":`<td>${esc(l.userName)}</td>`}
     <td><span class="pill p-type">${esc(BOOT.leaveTypes[l.type].label)}</span></td>
     <td>${fmtDate(l.from)} – ${fmtDate(l.to)}</td><td>${l.days}</td><td>${statusPill(l)}</td>
     <td><button class="btn ghost sm" onclick="openDetail('${l.id}')">ดู</button></td></tr>`).join("")}
   </tbody></table></div>`;
}
function statusPill(l){if(l.status==="approved")return`<span class="pill p-ok">อนุมัติแล้ว</span>`;
  if(l.status==="rejected")return`<span class="pill p-no">ไม่อนุมัติ</span>`;
  return`<span class="pill p-wait">รอ ${esc(l.stepLabel||"")}</span>`;}
function renderApprove(list){
  $("#view").innerHTML=!list.length?`<div class="card"><h2>รายการรออนุมัติ</h2><div class="empty">ไม่มีใบลารอการพิจารณาของท่าน</div></div>`:
   `<div class="card"><h2>รายการรออนุมัติ (${list.length})</h2><table><thead><tr><th>เลขที่</th><th>ผู้ลา</th><th>สังกัด</th><th>ประเภท</th><th>ช่วงวันลา</th><th>วัน</th><th></th></tr></thead>
   <tbody>${list.map(l=>`<tr><td>${esc(l.no)}</td><td>${esc(l.userName)}</td><td>${esc(l.userGroup)}</td>
     <td><span class="pill p-type">${esc(BOOT.leaveTypes[l.type].label)}</span></td>
     <td>${fmtDate(l.from)} – ${fmtDate(l.to)}</td><td>${l.days}</td>
     <td><button class="btn ghost sm" onclick="openDetail('${l.id}')">พิจารณา</button></td></tr>`).join("")}
   </tbody></table></div>`;
}

/* ===== detail modal ===== */
async function openDetail(id){
  let l;try{l=await api("/leaves/"+id);}catch(e){alert(e.message);return;}
  const canAct=isApprover()&&l.status==="pending"&&l.chain[l.chain.findIndex(s=>s.status==="pending")]
    &&l.chain[l.chain.findIndex(s=>s.status==="pending")].approverName===ME.user.name;
  let cur=l.chain.findIndex(s=>s.status==="pending");
  const steps=l.chain.length?l.chain.map((s,i)=>{
    let cls="wait",ic="•";if(s.status==="approved"){cls="ok";ic="✓"}else if(s.status==="rejected"){cls="no";ic="✕"}else if(i===cur){cls="now";ic="…"}
    let sub=` — ${esc(s.approverName)}`;if(s.by)sub+=` · ${fmtDT(s.at)}${s.note?` · "${esc(s.note)}"`:""}`;else if(i===cur)sub+=" · กำลังพิจารณา";
    return `<div class="step"><div class="dot ${cls}">${ic}</div><div><b>${esc(s.label)}</b>${sub}</div></div>`;
  }).join(""):`<div class="step"><div class="dot ok">✓</div><div>อนุมัติในตัว (ผู้มีอำนาจสูงสุด)</div></div>`;
  $("#modalBody").innerHTML=`
    <h2>ใบลาเลขที่ ${esc(l.no)}</h2>
    <p style="margin:2px 0"><b>ผู้ลา:</b> ${esc(l.userName)} · ${esc(l.userPos)}</p>
    <p style="margin:2px 0"><b>สังกัด:</b> ${esc(l.userGroup)}</p>
    <p style="margin:2px 0"><b>ประเภท:</b> ${esc(BOOT.leaveTypes[l.type].label)} · <b>รวม</b> ${l.days} วัน</p>
    <p style="margin:2px 0"><b>ช่วงวันลา:</b> ${fmtDate(l.from)} – ${fmtDate(l.to)}</p>
    <p style="margin:2px 0"><b>เหตุผล:</b> ${esc(l.reason)}</p>
    ${l.cover?`<p style="margin:2px 0"><b>ผู้ปฏิบัติแทน:</b> ${esc(l.cover)}</p>`:""}
    <p style="margin:2px 0" class="muted">ยื่นเมื่อ ${fmtDT(l.createdAt)}</p>
    <h2 style="margin-top:16px">สายการอนุมัติ</h2><div class="steps">${steps}</div>
    ${canAct?`<label>บันทึก/ความเห็น (ถ้ามี)</label><textarea id="actNote"></textarea>
      <div style="margin-top:14px;display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn green" onclick="act('${l.id}','approve')">อนุมัติ</button>
        <button class="btn red" onclick="act('${l.id}','reject')">ไม่อนุมัติ</button>
        <button class="btn gold" onclick="window.open('/print/leave/${l.id}','_blank')">🖨️ พิมพ์ใบลา</button>
        <button class="btn ghost" onclick="closeModal()">ปิด</button></div>`
     :`<div style="margin-top:16px;display:flex;gap:10px;flex-wrap:wrap">
        ${ME.admin?`<button class="btn red" onclick="cancelLeave('${l.id}')">ยกเลิก/ลบใบลานี้</button>`:""}
        <button class="btn gold" onclick="window.open('/print/leave/${l.id}','_blank')">🖨️ พิมพ์ใบลา</button>
        <button class="btn ghost" onclick="closeModal()">ปิด</button></div>`}`;
  $("#modalBg").classList.add("show");
}
function closeModal(){$("#modalBg").classList.remove("show");}
$("#modalBg").addEventListener("click",e=>{if(e.target.id==="modalBg")closeModal();});
async function act(id,kind){
  try{await api("/leaves/"+id+"/action",{method:"POST",body:JSON.stringify({kind,note:$("#actNote")?$("#actNote").value:""})});
    closeModal();render();
  }catch(e){alert(e.message);}
}
async function cancelLeave(id){
  if(!confirm("ยืนยันยกเลิก/ลบใบลานี้? เมื่อลบแล้วจะกู้คืนไม่ได้"))return;
  try{await api("/admin/leaves/"+id,{method:"DELETE"});
    closeModal();render();
  }catch(e){alert(e.message);}
}

/* ===== summary ===== */
function renderSummary(d){
  $("#view").innerHTML=`<div class="card"><h2>สรุปวันลาของฉัน ปี ${d.year}</h2>
    <div class="stat-grid">${Object.entries(d.summary).map(([k,v])=>
      `<div class="stat"><div class="n">${v.used}<span style="font-size:15px;color:#697586">/${v.max}</span></div>
       <div class="l">${BOOT.leaveTypes[k].label} (วัน)</div></div>`).join("")}</div>
    <p class="muted" style="margin-top:14px">* นับเฉพาะใบลาที่อนุมัติครบทุกระดับแล้ว</p></div>`;
}

/* ===== admin: users ===== */
function renderUsers(users){
  const groups=[...new Set(users.map(u=>u.group))];
  window._users=users;
  $("#view").innerHTML=`<div class="card"><h2>จัดการรายชื่อกำลังพล (${users.length} นาย)</h2>
    <div style="margin-bottom:10px"><button class="btn sm" onclick="editUser()">+ เพิ่มรายชื่อ</button></div>
    <input id="uf" placeholder="ค้นหาชื่อ/ตำแหน่ง/นามเรียกขาน" oninput="filterUsers()" style="margin-bottom:8px">
    <div id="uTable">${usersTable(users,groups)}</div></div>`;
}
function usersTable(list,groups){
  return groups.map(g=>{const inG=list.filter(u=>u.group===g);if(!inG.length)return"";
    return `<h3>${esc(shortGroup(g))}</h3><table><thead><tr><th>ยศ ชื่อ สกุล</th><th>ตำแหน่ง</th><th>สิทธิ์</th><th>อีเมล/LINE</th><th></th></tr></thead>
    <tbody>${inG.map(u=>`<tr><td>${esc(u.name)}</td><td>${esc(u.pos)}</td>
      <td>${esc(roleLabel(u.role))}</td><td class="muted">${esc(u.email||"-")}${u.lineId?" / LINE":""}</td>
      <td><button class="btn ghost sm" onclick="editUser('${u.id}')">แก้ไข</button>
          <button class="btn red sm" onclick="delUser('${u.id}')">ลบ</button></td></tr>`).join("")}</tbody></table>`;}).join("");
}
function roleLabel(r){return{staff:"เจ้าหน้าที่",supervisor:"หัวหน้างาน",deputy:"รอง ผกก.",commander:"ผกก.",admin:"ผู้ดูแล"}[r]||r;}
function filterUsers(){const q=$("#uf").value.trim().toLowerCase();
  const list=window._users.filter(u=>!q||[u.name,u.pos,u.call,u.tel].join(" ").toLowerCase().includes(q));
  $("#uTable").innerHTML=list.length?usersTable(list,[...new Set(list.map(u=>u.group))]):'<div class="empty">ไม่พบข้อมูล</div>';}
function editUser(id){
  const u=id?window._users.find(x=>x.id===id):{name:"",rank:"",pos:"",group:"",role:"staff",tel:"",call:"",email:"",lineId:""};
  const groups=[...new Set(window._users.map(x=>x.group))];
  $("#modalBody").innerHTML=`<h2>${id?"แก้ไข":"เพิ่ม"}รายชื่อ</h2>
    <label>ยศ ชื่อ สกุล</label><input id="eName" value="${esc(u.name)}">
    <div class="row"><div><label>ยศ (ย่อ)</label><input id="eRank" value="${esc(u.rank)}"></div>
    <div><label>นามเรียกขาน</label><input id="eCall" value="${esc(u.call||"")}"></div></div>
    <label>ตำแหน่ง</label><input id="ePos" value="${esc(u.pos)}">
    <label>สังกัด (กลุ่มงาน)</label><input id="eGroup" list="glist" value="${esc(u.group)}">
    <datalist id="glist">${groups.map(g=>`<option value="${esc(g)}">`).join("")}</datalist>
    <label>สิทธิ์</label><select id="eRole">${["staff","supervisor","deputy","commander"].map(r=>`<option value="${r}" ${u.role===r?"selected":""}>${roleLabel(r)}</option>`).join("")}</select>
    <div class="row"><div><label>อีเมล (แจ้งเตือน)</label><input id="eEmail" value="${esc(u.email||"")}"></div>
    <div><label>LINE userId (แจ้งเตือน)</label><input id="eLine" value="${esc(u.lineId||"")}"></div></div>
    <label>เบอร์โทร</label><input id="eTel" value="${esc(u.tel||"")}">
    <div style="margin-top:14px;display:flex;gap:10px"><button class="btn" onclick="saveUser('${id||""}')">บันทึก</button>
      <button class="btn ghost" onclick="closeModal()">ยกเลิก</button></div>`;
  $("#modalBg").classList.add("show");
}
async function saveUser(id){
  try{await api("/admin/users",{method:"POST",body:JSON.stringify({id:id||undefined,
    name:$("#eName").value,rank:$("#eRank").value,pos:$("#ePos").value,group:$("#eGroup").value,
    role:$("#eRole").value,tel:$("#eTel").value,call:$("#eCall").value,email:$("#eEmail").value,lineId:$("#eLine").value})});
    closeModal();loadTab("users");
  }catch(e){alert(e.message);}
}
async function delUser(id){if(!confirm("ยืนยันลบรายชื่อนี้?"))return;
  try{await api("/admin/users/"+id,{method:"DELETE"});loadTab("users");}catch(e){alert(e.message);}}

/* ===== admin: routing ===== */
function renderRouting(d){
  window._routing=d;const users=window._allUsers||[];
  // load users for dropdowns
  api("/admin/users").then(us=>{window._allUsers=us;drawRouting(d,us);});
  $("#view").innerHTML=`<div class="card"><h2>สายการอนุมัติแต่ละกลุ่มงาน</h2><div id="rt"><div class="empty">กำลังโหลด...</div></div></div>`;
}
function drawRouting(d,users){
  const opt=(sel)=>users.map(u=>`<option value="${u.id}" ${sel===u.id?"selected":""}>${esc(u.name)} (${esc(roleLabel(u.role))})</option>`).join("");
  const rows=d.groups.map(g=>{const r=d.routing[g]||{};
    return `<tr><td>${esc(shortGroup(g))}</td>
      <td><select data-g="${esc(g)}" data-k="sup"><option value="">— ไม่มี —</option>${opt(r.sup)}</select></td>
      <td><select data-g="${esc(g)}" data-k="dep"><option value="">— ไม่มี —</option>${opt(r.dep)}</select></td></tr>`;}).join("");
  $("#rt").innerHTML=`<p class="muted">ลำดับอนุมัติ: หัวหน้างาน → รอง ผกก. → ผกก. (อนุมัติขั้นสุดท้าย)</p>
    <table><thead><tr><th>กลุ่มงาน</th><th>หัวหน้างาน</th><th>รอง ผกก.</th></tr></thead><tbody>${rows}</tbody></table>
    <label style="margin-top:14px">ผกก. (อนุมัติขั้นสุดท้ายของทุกคน)</label>
    <select id="rtCmd">${opt(d.commander)}</select>
    <div style="margin-top:14px"><button class="btn" onclick="saveRouting()">บันทึกสายการอนุมัติ</button></div>`;
}
async function saveRouting(){
  const routing={};document.querySelectorAll("#rt select[data-g]").forEach(s=>{
    const g=s.getAttribute("data-g"),k=s.getAttribute("data-k");routing[g]=routing[g]||{};routing[g][k]=s.value||null;});
  try{await api("/admin/routing",{method:"POST",body:JSON.stringify({routing,commander:$("#rtCmd").value})});
    alert("บันทึกสายการอนุมัติแล้ว");loadTab("routing");
  }catch(e){alert(e.message);}
}

/* ===== admin: import ===== */
function renderImport(){
  $("#view").innerHTML=`<div class="card"><h2>นำเข้ารายชื่อจากไฟล์ Excel</h2>
    <p class="muted">รองรับไฟล์ทำเนียบกำลังพล (.xlsx) รูปแบบคอลัมน์: ลำดับ | ยศ ชื่อ สกุล | ตำแหน่ง | โทรศัพท์ | นามเรียกขาน
    โดยแถวที่เป็นชื่อกลุ่มงาน (เช่น "งานจราจร (19 นาย)") ให้อยู่คอลัมน์แรกไม่มีเลขลำดับ</p>
    <p class="muted"><b>ระบบจะกำหนดสิทธิ์และสายการอนุมัติให้อัตโนมัติ</b> จากตำแหน่ง (ผกก./รอง ผกก./สว.-สวป. = ผู้อนุมัติ)
    และคงข้อมูลอีเมล/LINE เดิมไว้โดยจับคู่ตามชื่อ ส่วนใบลาที่มีอยู่จะไม่ถูกลบ</p>
    <input type="file" id="impFile" accept=".xlsx,.xls">
    <div style="margin-top:14px"><button class="btn" onclick="doImport()">อัปโหลดและนำเข้า</button></div>
    <div id="impResult" style="margin-top:14px"></div></div>`;
}
async function doImport(){
  const f=$("#impFile").files[0];if(!f){alert("กรุณาเลือกไฟล์");return;}
  const fd=new FormData();fd.append("file",f);
  $("#impResult").innerHTML="กำลังนำเข้า...";
  try{const r=await apiForm("/admin/import",fd);
    BOOT=await api("/bootstrap");
    $("#impResult").innerHTML=`<div class="card" style="background:#e0f3e8;border-color:#bfe6cd">
      นำเข้าสำเร็จ <b>${r.count}</b> นาย · กลุ่มงาน: ${r.groups.map(esc).join(", ")} · ผกก.: ${esc(r.commander||"-")}</div>`;
  }catch(e){$("#impResult").innerHTML=`<div class="card" style="background:#fbe3e0;border-color:#f0c3bd">${esc(e.message)}</div>`;}
}

/* ===== admin: report ===== */
function renderReport(d){
  $("#view").innerHTML=`<div class="card"><h2>รายงานภาพรวม</h2>
    <div style="margin-bottom:12px"><button class="btn gold" onclick="window.open('/print/report','_blank')">🖨️ พิมพ์รายงาน / บันทึก PDF</button></div>
    <div class="stat-grid">
      <div class="stat"><div class="n">${d.total}</div><div class="l">ใบลาทั้งหมด</div></div>
      <div class="stat"><div class="n" style="color:#1f8a4c">${d.approved}</div><div class="l">อนุมัติแล้ว</div></div>
      <div class="stat"><div class="n" style="color:#c98a12">${d.pending}</div><div class="l">รออนุมัติ</div></div>
      <div class="stat"><div class="n" style="color:#c0392b">${d.rejected}</div><div class="l">ไม่อนุมัติ</div></div>
    </div>
    <h2 style="margin-top:20px">วันลาที่อนุมัติ แยกประเภท</h2>
    <div class="stat-grid">${Object.entries(d.byType).map(([k,v])=>`<div class="stat"><div class="n">${v}</div><div class="l">${BOOT.leaveTypes[k].label} (วัน)</div></div>`).join("")}</div>
  </div>`;
}
</script>
</body>
</html>
